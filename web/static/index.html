<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RPP Workbench</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>RPP Workbench</h1>
            <p id="api-state">Connecting</p>
          </div>
          <button id="refresh-jobs" class="icon-button" title="Refresh jobs">↻</button>
        </div>

        <form id="upload-form" class="upload-panel">
          <label>
            <span>STEP file</span>
            <input id="step-file" name="step_file" type="file" accept=".stp,.step" />
          </label>
          <label>
            <span>Factory profile</span>
            <select id="factory-profile" name="factory_profile">
              <option value="factory_profiles/nash_nz.json">NASH NZ</option>
              <option value="factory_profiles/generic_3axis.json">Generic 3-Axis</option>
            </select>
          </label>
          <div class="row">
            <label>
              <span>Resolution</span>
              <input id="resolution" name="resolution" type="number" min="16" max="96" step="16" value="64" />
            </label>
            <label>
              <span>Confidence</span>
              <input id="confidence" name="confidence" type="number" min="0" max="1" step="0.05" value="0.5" />
            </label>
          </div>
          <label>
            <span>Model path</span>
            <input id="model" name="model" type="text" placeholder="checkpoints/best.pt" />
          </label>
          <button type="submit" class="primary-button">Run Pipeline</button>
        </form>

        <section>
          <div class="section-title">Jobs</div>
          <div id="job-list" class="job-list"></div>
        </section>
      </aside>

      <section class="viewer-section">
        <div class="viewer-toolbar">
          <div>
            <div class="label">Active Job</div>
            <h2 id="active-job">No job selected</h2>
          </div>
          <div class="view-toggles">
            <button id="toggle-mesh" class="toggle active" type="button">Mesh</button>
            <button id="toggle-voxels" class="toggle" type="button">Voxels</button>
            <button id="toggle-surface" class="toggle" type="button">Surface</button>
            <button id="toggle-features" class="toggle active" type="button">Features</button>
          </div>
        </div>
        <div id="viewer"></div>
        <div class="legend">
          <span><i class="swatch mesh"></i>STL</span>
          <span><i class="swatch voxel"></i>Voxel sample</span>
          <span><i class="swatch surface"></i>Surface sample</span>
          <span><i class="swatch feature"></i>Feature bounds</span>
          <span><i class="swatch review"></i>Review</span>
        </div>
      </section>

      <aside class="details">
        <section class="decision-panel">
          <div class="label">Recommendation</div>
          <div id="recommendation" class="recommendation unknown">UNKNOWN</div>
          <div id="summary-grid" class="summary-grid"></div>
        </section>

        <section>
          <div class="section-title">Review Codes</div>
          <div id="review-codes" class="pill-list"></div>
        </section>

        <section>
          <div class="section-title">Phase Outputs</div>
          <div id="phase-list" class="phase-list"></div>
        </section>

        <section>
          <div class="section-title">Simulation Handoff</div>
          <div id="simulation-panel" class="simulation-panel"></div>
        </section>

        <section>
          <div class="section-title">Operation Timeline</div>
          <div id="operation-list" class="operation-list"></div>
        </section>
      </aside>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
